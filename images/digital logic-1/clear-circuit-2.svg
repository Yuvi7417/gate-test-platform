<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Labels -->
  <g font-family="Times New Roman, serif" font-style="italic" font-size="18">
    <text x="25" y="45">a</text>
    <text x="25" y="85">b</text>
    <text x="25" y="125">c</text>
    <text x="25" y="145">d</text>
    <text x="25" y="165">e</text>
    <text x="25" y="225">f</text>
    <text x="360" y="55">y<tspan dy="4" font-size="13">1</tspan></text>
    <text x="430" y="185">y<tspan dy="4" font-size="13">2</tspan></text>
  </g>

  <!-- Wires and simple paths -->
  <g fill="none" stroke="#000" stroke-width="1.5">
    <!-- a -->
    <line x1="40" y1="40" x2="240" y2="40"/>
    
    <!-- b -->
    <line x1="40" y1="80" x2="100" y2="80"/>
    <polyline points="128,80 210,80 210,180 270,180"/>
    
    <!-- c, d, e to OR gate -->
    <polyline points="40,120 80,120 80,130 120,130"/>
    <line x1="40" y1="140" x2="120" y2="140"/>
    <polyline points="40,160 80,160 80,150 120,150"/>
    
    <!-- OR gate output and branching -->
    <line x1="180" y1="140" x2="190" y2="140"/>
    
    <!-- Branch DOWN to NAND -->
    <polyline points="190,140 190,160 270,160"/>
    
    <!-- Branch UP to XOR (with jump) -->
    <line x1="190" y1="140" x2="190" y2="88"/>
    <path d="M 190 88 A 8 8 0 0 1 190 72"/>
    <polyline points="190,72 190,60 240,60"/>
    
    <!-- f to NAND -->
    <polyline points="40,220 250,220 250,200 270,200"/>
    
    <!-- XOR output -->
    <line x1="300" y1="50" x2="350" y2="50"/>
    
    <!-- NAND output to NOT -->
    <line x1="328" y1="180" x2="360" y2="180"/>
    
    <!-- NOT output -->
    <line x1="388" y1="180" x2="420" y2="180"/>
  </g>

  <!-- Gates (fill="#e2e2e2" stroke="#000" stroke-width="1.5") -->
  <g fill="#e2e2e2" stroke="#000" stroke-width="1.5">
    <!-- NOT gate on b -->
    <polygon points="100,70 100,90 120,80"/>
    <circle cx="124" cy="80" r="4" fill="white"/>
    
    <!-- OR gate for c,d,e -->
    <!-- Center is at 140, inputs at 130, 140, 150. -->
    <path d="M 120 120 Q 140 140 120 160 Q 160 160 180 140 Q 160 120 120 120 Z"/>
    
    <!-- XOR gate -->
    <!-- Gap line -->
    <path d="M 240 30 Q 255 50 240 70" fill="none"/>
    <!-- Main body -->
    <path d="M 246 30 Q 261 50 246 70 Q 280 70 300 50 Q 280 30 246 30 Z"/>
    
    <!-- NAND gate -->
    <!-- Inputs at 160, 180, 200. Bounding box y:150 to 210, x:270 to 320 -->
    <path d="M 270 150 L 290 150 A 30 30 0 0 1 290 210 L 270 210 Z"/>
    <circle cx="324" cy="180" r="4" fill="white"/>
    
    <!-- NOT gate on output -->
    <polygon points="360,170 360,190 380,180"/>
    <circle cx="384" cy="180" r="4" fill="white"/>
  </g>
  
  <!-- Connection dots -->
  <g fill="#000">
    <circle cx="190" cy="140" r="3.5"/>
  </g>
</svg>
