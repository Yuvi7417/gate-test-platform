<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <g id="not">
      <polygon points="0,-10 0,10 20,0" fill="#e2e2e2" stroke="#000" stroke-width="1.5"/>
      <circle cx="24" cy="0" r="4" fill="white" stroke="#000" stroke-width="1.5"/>
      <line x1="-20" y1="0" x2="0" y2="0" stroke="#000" stroke-width="1.5"/>
    </g>
  </defs>

  <g font-family="Times New Roman, serif" font-size="18">
    <text x="520" y="55">Output</text>
  </g>

  <g fill="none" stroke="#000" stroke-width="1.5">
    <line x1="40" y1="50" x2="100" y2="50"/>
    <line x1="128" y1="50" x2="170" y2="50"/>
    <line x1="198" y1="50" x2="240" y2="50"/>
    <line x1="268" y1="50" x2="310" y2="50"/>
    <line x1="338" y1="50" x2="380" y2="50"/>
    <line x1="408" y1="50" x2="450" y2="50"/>
    <line x1="478" y1="50" x2="510" y2="50"/>

    <!-- Feedback loop -->
    <polyline points="420,50 420,130 80,130 80,50"/>
  </g>
  
  <!-- Feedback Arrow -->
  <polygon points="250,130 260,125 260,135" fill="#000" stroke="#000"/>

  <!-- Dots -->
  <g fill="#000">
    <circle cx="80" cy="50" r="3.5"/>
    <circle cx="420" cy="50" r="3.5"/>
  </g>

  <g fill="white" stroke="#000" stroke-width="1.5">
    <circle cx="510" cy="50" r="3.5"/>
  </g>

  <!-- Gates -->
  <use href="#not" x="100" y="50"/>
  <use href="#not" x="170" y="50"/>
  <use href="#not" x="240" y="50"/>
  <use href="#not" x="310" y="50"/>
  <use href="#not" x="380" y="50"/>
  <use href="#not" x="450" y="50"/>
</svg>
